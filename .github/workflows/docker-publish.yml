name: Publish backend image

# CI for the celeb demo: on every push to main that touches the backend,
# build the FastAPI image (dlib / face_recognition) and push it to Docker Hub.
# The VM then pulls it (pull-based CD): `make deploy-celeb` on gabs-demos.
#
# Requires two repo secrets (Settings > Secrets and variables > Actions):
#   DOCKERHUB_USERNAME  = gacerioni
#   DOCKERHUB_TOKEN     = a Docker Hub access token (Account > Security)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'config.py'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            gacerioni/celebrity-face-match-backend:latest
            gacerioni/celebrity-face-match-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
